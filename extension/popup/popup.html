<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClickTut Recorder</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>ClickTut</h1>
      <p class="subtitle">Tutorial Recorder</p>
    </div>

    <div class="status" id="status">
      <div class="status-indicator" id="statusIndicator"></div>
      <span id="statusText">Not Recording</span>
    </div>

    <div class="recording-info" id="recordingInfo" style="display: none;">
      <div class="info-item">
        <span class="label">Clicks:</span>
        <span class="value" id="clickCount">0</span>
      </div>
      <div class="info-item">
        <span class="label">Tutorial ID:</span>
        <span class="value" id="tutorialId">-</span>
      </div>
    </div>

    <div class="form-section" id="formSection">
      <input 
        type="text" 
        id="tutorialTitle" 
        placeholder="Tutorial Title (optional)"
        class="input-field"
      >
      <textarea 
        id="tutorialDescription" 
        placeholder="Description (optional)"
        class="textarea-field"
        rows="2"
      ></textarea>
    </div>

    <div class="actions">
      <button id="startBtn" class="btn btn-primary">
        Start Recording
      </button>
      <button id="stopBtn" class="btn btn-danger" style="display: none;">
        Stop Recording
      </button>
    </div>

    <div class="footer">
      <a href="#" id="dashboardLink">Open Dashboard</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
